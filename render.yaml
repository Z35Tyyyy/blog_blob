# Render blueprint — deploy the CMS backend as a web service.
# In the Render dashboard: New → Blueprint → connect this repo.
services:
  - type: web
    name: blog-blob-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # paste your MongoDB Atlas connection string in the dashboard
      - key: MONGODB_DB
        value: blog_blob
      - key: ALLOWED_ORIGINS
        sync: false # your Vercel URL, e.g. https://blog-blob.vercel.app
      - key: EXPORT_KEY
        sync: false # same value as the GitHub repo secret EXPORT_KEY (content sync)
      - key: SETUP_TOKEN
        sync: false # required to complete first-run admin setup (blocks land-grab)
