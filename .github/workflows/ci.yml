name: ci

on:
  pull_request:
    paths-ignore:
      - 'content/**' # published blog output — nothing to test
  workflow_dispatch:

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server

  editor-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - run: npm ci
        working-directory: editor
      - run: npm run build
        working-directory: editor
